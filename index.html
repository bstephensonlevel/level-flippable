<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Flipbook</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=DM+Sans:wght@400;500;600&display=swap');

  * { margin: 0; padding: 0; box-sizing: border-box; }

  body {
    font-family: 'DM Sans', sans-serif;
    background: #1a1a1e;
    min-height: 100vh;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    overflow: hidden;
    color: #ccc;
  }

  .zoom-wrapper {
    position: relative;
    display: flex;
    align-items: center;
    justify-content: center;
    width: 100%;
    overflow: hidden;
    cursor: default;
  }

  .zoom-wrapper.is-panning {
    cursor: grab;
  }

  .zoom-wrapper.is-panning:active {
    cursor: grabbing;
  }

  .exit-zoom-btn {
    position: absolute;
    top: 16px;
    left: 50%;
    transform: translateX(-50%) translateY(-8px);
    background: rgba(20, 20, 24, 0.85);
    backdrop-filter: blur(12px);
    -webkit-backdrop-filter: blur(12px);
    border: 1px solid rgba(255,255,255,0.12);
    color: #ddd;
    font-family: 'DM Sans', sans-serif;
    font-size: 13px;
    font-weight: 500;
    letter-spacing: 0.3px;
    padding: 8px 20px;
    border-radius: 20px;
    cursor: pointer;
    z-index: 100;
    opacity: 0;
    pointer-events: none;
    transition: opacity 0.25s, transform 0.25s, background 0.15s;
    display: flex;
    align-items: center;
    gap: 7px;
    box-shadow: 0 4px 20px rgba(0,0,0,0.4);
  }

  .exit-zoom-btn.visible {
    opacity: 1;
    pointer-events: auto;
    transform: translateX(-50%) translateY(0);
  }

  .exit-zoom-btn:hover {
    background: rgba(40, 40, 48, 0.95);
    color: #fff;
  }

  .exit-zoom-btn svg {
    width: 14px;
    height: 14px;
    flex-shrink: 0;
  }

  .flipbook-container {
    perspective: 2400px;
    display: flex;
    align-items: center;
    justify-content: center;
    position: relative;
    width: 100%;
    max-width: 1000px;
    padding: 20px;
    transition: transform 0.3s cubic-bezier(0.25, 0.46, 0.45, 0.94);
    transform-origin: center center;
    will-change: transform;
  }

  .book {
    position: relative;
    width: 100%;
    aspect-ratio: 1.55 / 1;
    transform-style: preserve-3d;
  }

  /* Two-page spread container */
  .spread {
    position: absolute;
    inset: 0;
    display: grid;
    grid-template-columns: 1fr 1fr;
    border-radius: 4px;
    overflow: hidden;
    box-shadow:
      0 20px 60px rgba(0,0,0,0.5),
      0 8px 20px rgba(0,0,0,0.3);
  }

  .spread.hidden { display: none; }

  .page {
    position: relative;
    background: #fff;
    overflow: hidden;
  }

  .page img {
    width: 100%;
    height: 100%;
    object-fit: contain;
    object-position: top center;
    display: block;
    background: #fff;
  }

  .page.empty {
    background: #f8f7f5;
    display: flex;
    align-items: center;
    justify-content: center;
  }

  .page.empty::after {
    content: '';
    display: block;
  }

  /* Center spine shadow */
  .spine-shadow {
    position: absolute;
    top: 0;
    left: 50%;
    transform: translateX(-50%);
    width: 60px;
    height: 100%;
    background: linear-gradient(
      to right,
      transparent 0%,
      rgba(0,0,0,0.08) 15%,
      rgba(0,0,0,0.18) 35%,
      rgba(0,0,0,0.25) 50%,
      rgba(0,0,0,0.18) 65%,
      rgba(0,0,0,0.08) 85%,
      transparent 100%
    );
    pointer-events: none;
    z-index: 10;
  }

  /* Inner edge lighting */
  .page-left::after {
    content: '';
    position: absolute;
    top: 0;
    right: 0;
    width: 40px;
    height: 100%;
    background: linear-gradient(to left, rgba(0,0,0,0.06), transparent);
    pointer-events: none;
  }

  .page-right::before {
    content: '';
    position: absolute;
    top: 0;
    left: 0;
    width: 40px;
    height: 100%;
    background: linear-gradient(to right, rgba(0,0,0,0.06), transparent);
    pointer-events: none;
    z-index: 2;
  }

  /* Page turn animation overlay */
  .turn-overlay {
    position: absolute;
    inset: 0;
    z-index: 20;
    pointer-events: none;
    display: none;
  }

  .turn-overlay.active { display: block; }

  .turning-page {
    position: absolute;
    top: 0;
    width: 50%;
    height: 100%;
    transform-origin: left center;
    transform-style: preserve-3d;
    transition: transform 0.7s cubic-bezier(0.645, 0.045, 0.355, 1);
    z-index: 30;
  }

  .turning-page.from-right {
    left: 50%;
    transform-origin: left center;
  }

  .turning-page.from-left {
    left: 0;
    transform-origin: right center;
  }

  .turning-page .front,
  .turning-page .back {
    position: absolute;
    inset: 0;
    backface-visibility: hidden;
    overflow: hidden;
    background: #fff;
  }

  .turning-page .back {
    transform: rotateY(180deg);
  }

  .turning-page .front img,
  .turning-page .back img {
    width: 100%;
    height: 100%;
    object-fit: contain;
    object-position: top center;
    display: block;
  }

  /* Page turn shadow on the fold */
  .turning-page .front::after {
    content: '';
    position: absolute;
    top: 0;
    left: 0;
    width: 100%;
    height: 100%;
    background: linear-gradient(to right, rgba(0,0,0,0.15), transparent 30%);
    transition: opacity 0.7s;
  }

  .turning-page .back::after {
    content: '';
    position: absolute;
    top: 0;
    right: 0;
    width: 100%;
    height: 100%;
    background: linear-gradient(to left, rgba(0,0,0,0.15), transparent 30%);
    transition: opacity 0.7s;
  }

  /* Navigation */
  .nav-area {
    position: absolute;
    top: 0;
    width: 50%;
    height: 100%;
    z-index: 5;
    cursor: pointer;
  }

  .nav-left { left: 0; cursor: w-resize; }
  .nav-right { right: 0; cursor: e-resize; }

  .nav-area.disabled { cursor: default; pointer-events: none; }

  /* Corner peel hints */
  .corner-peel {
    position: absolute;
    width: 60px;
    height: 60px;
    pointer-events: none;
    z-index: 12;
    transition: opacity 0.2s;
    opacity: 0;
  }

  .corner-peel-br {
    bottom: 0;
    right: 0;
  }

  .corner-peel-bl {
    bottom: 0;
    left: 0;
  }

  .corner-peel canvas {
    width: 100%;
    height: 100%;
  }

  /* Controls bar */
  .controls {
    display: flex;
    align-items: center;
    gap: 16px;
    margin-top: 12px;
    margin-bottom: 16px;
    opacity: 0.7;
    transition: opacity 0.3s;
  }

  .controls:hover { opacity: 1; }

  .page-indicator {
    font-size: 13px;
    letter-spacing: 0.5px;
    color: #888;
    min-width: 90px;
    text-align: center;
  }

  .nav-btn {
    background: rgba(255,255,255,0.08);
    border: 1px solid rgba(255,255,255,0.12);
    color: #aaa;
    width: 36px;
    height: 36px;
    border-radius: 50%;
    display: flex;
    align-items: center;
    justify-content: center;
    cursor: pointer;
    transition: all 0.2s;
    font-size: 16px;
  }

  .nav-btn:hover:not(:disabled) {
    background: rgba(255,255,255,0.14);
    color: #fff;
  }

  .nav-btn:disabled {
    opacity: 0.3;
    cursor: default;
  }

  .controls-divider {
    width: 1px;
    height: 20px;
    background: rgba(255,255,255,0.12);
  }

  .zoom-level {
    font-size: 12px;
    letter-spacing: 0.3px;
    color: #666;
    min-width: 40px;
    text-align: center;
    font-variant-numeric: tabular-nums;
  }

  /* Ambient glow behind book */
  .book::before {
    content: '';
    position: absolute;
    inset: -30px;
    background: radial-gradient(ellipse at center, rgba(255,255,255,0.03), transparent 70%);
    z-index: -1;
    pointer-events: none;
  }

  /* Responsive */
  @media (max-width: 700px) {
    .flipbook-container { padding: 10px; }
    .spine-shadow { width: 30px; }
  }

  .logo-bar {
    width: 100%;
    max-width: 1000px;
    padding: 0 20px;
    margin-bottom: 10px;
  }

  .logo-bar a {
    display: inline-block;
    opacity: 0.6;
    transition: opacity 0.2s;
  }

  .logo-bar a:hover {
    opacity: 1;
  }
</style>
</head>

</div>

<div class="zoom-wrapper" id="zoomWrapper">
<button class="exit-zoom-btn" id="exitZoomBtn">
  <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
    <circle cx="11" cy="11" r="8"/><line x1="21" y1="21" x2="16.65" y2="16.65"/><line x1="8" y1="11" x2="14" y2="11"/>
  </svg>
  Exit Zoom
</button>
<div class="flipbook-container" id="flipbookContainer">
  <div class="book" id="book">

  </div>
  <div class="nav-area nav-left" id="navLeft" title="Previous page"></div>
  <div class="nav-area nav-right" id="navRight" title="Next page"></div>
</div>
</div>

<div class="controls">

  <div class="page-indicator" id="pageIndicator">Pages 1–2 of 5</div>

  <div class="controls-divider"></div>
  <button class="nav-btn" id="btnZoomOut" title="Zoom out (-)">&#8722;</button>
  <div class="zoom-level" id="zoomLevel">100%</div>
  <button class="nav-btn" id="btnZoomIn" title="Zoom in (+)">&#43;</button>
</div>

const totalPages = PAGE_IMAGES.length;
let currentSpread = 0;
let isAnimating = false;

const IMG_STYLE = 'width:100%;height:100%;object-fit:contain;object-position:top center;display:block;';

function getSpreadCount() { return Math.ceil(totalPages / 2); }

function makePageImg(idx) {
  if (idx >= totalPages) return null;
  const img = document.createElement('img');
  img.src = PAGE_IMAGES[idx];
  img.alt = `Page ${idx + 1}`;
  img.style.cssText = IMG_STYLE;
  return img;
}

function buildSpreads() {
  const book = document.getElementById('book');
  book.innerHTML = '';
  const spreadCount = getSpreadCount();

  for (let s = 0; s < spreadCount; s++) {
    const leftIdx = s * 2;
    const rightIdx = s * 2 + 1;

    const spread = document.createElement('div');
    spread.className = 'spread' + (s === 0 ? '' : ' hidden');
    spread.dataset.spread = s;

    const leftPage = document.createElement('div');
    leftPage.className = 'page page-left';
    if (leftIdx < totalPages) {
      leftPage.appendChild(makePageImg(leftIdx));
    } else {
      leftPage.classList.add('empty');
    }

    const rightPage = document.createElement('div');
    rightPage.className = 'page page-right';
    if (rightIdx < totalPages) {
      rightPage.appendChild(makePageImg(rightIdx));
    } else {
      rightPage.classList.add('empty');
    }

    spread.appendChild(leftPage);
    spread.appendChild(rightPage);

    const spine = document.createElement('div');
    spine.className = 'spine-shadow';
    spread.appendChild(spine);

    book.appendChild(spread);
  }
}

function updateIndicator() {
  const leftPage = currentSpread * 2 + 1;
  const rightPage = Math.min(currentSpread * 2 + 2, totalPages);
  const indicator = document.getElementById('pageIndicator');

  if (leftPage === rightPage || rightPage > totalPages) {
    indicator.textContent = `Page ${leftPage} of ${totalPages}`;
  } else {
    indicator.textContent = `Pages ${leftPage}\u2013${rightPage} of ${totalPages}`;
  }

  document.getElementById('btnPrev').disabled = currentSpread === 0;
  document.getElementById('btnNext').disabled = currentSpread >= getSpreadCount() - 1;
  updateCornerPeels();
}

// ── Corner peel micro-animation ──
let peelRight = null;
let peelLeft = null;

function createCornerPeels() {
  const book = document.getElementById('book');

  // Right corner peel (for next page)
  peelRight = document.createElement('div');
  peelRight.className = 'corner-peel corner-peel-br';
  peelRight.innerHTML = `<canvas width="60" height="60"></canvas>`;
  book.appendChild(peelRight);
  drawPeelCanvas(peelRight.querySelector('canvas'), 'right', 0);

  // Left corner peel (for prev page)
  peelLeft = document.createElement('div');
  peelLeft.className = 'corner-peel corner-peel-bl';
  peelLeft.innerHTML = `<canvas width="60" height="60"></canvas>`;
  book.appendChild(peelLeft);
  drawPeelCanvas(peelLeft.querySelector('canvas'), 'left', 0);
}

function drawPeelCanvas(canvas, side, amount) {
  const ctx = canvas.getContext('2d');
  const w = canvas.width;
  const h = canvas.height;
  ctx.clearRect(0, 0, w, h);

  // amount: 0 to 1
  const peelSize = 8 + amount * 28; // 8px min curl to 36px full curl

  if (side === 'right') {
    // Bottom-right corner: curl lifts from bottom-right
    ctx.save();
    // Page background that's revealed under the curl
    ctx.beginPath();
    ctx.moveTo(w, h);
    ctx.lineTo(w - peelSize, h);
    ctx.quadraticCurveTo(w - peelSize * 0.3, h - peelSize * 0.3, w, h - peelSize);
    ctx.closePath();
    ctx.fillStyle = 'rgba(240, 238, 235, 0.9)';
    ctx.fill();

    // Shadow under the curl
    const grad = ctx.createRadialGradient(w - peelSize * 0.5, h - peelSize * 0.5, 0, w - peelSize * 0.5, h - peelSize * 0.5, peelSize);
    grad.addColorStop(0, 'rgba(0,0,0,0.12)');
    grad.addColorStop(1, 'rgba(0,0,0,0)');
    ctx.fillStyle = grad;
    ctx.fill();

    // The curled paper
    ctx.beginPath();
    ctx.moveTo(w, h);
    ctx.lineTo(w - peelSize * 0.7, h);
    ctx.quadraticCurveTo(w - peelSize * 0.15, h - peelSize * 0.15, w, h - peelSize * 0.7);
    ctx.closePath();
    ctx.fillStyle = '#fff';
    ctx.fill();
    ctx.strokeStyle = 'rgba(0,0,0,0.08)';
    ctx.lineWidth = 0.5;
    ctx.stroke();
    ctx.restore();
  } else {
    // Bottom-left corner: curl lifts from bottom-left
    ctx.save();
    ctx.beginPath();
    ctx.moveTo(0, h);
    ctx.lineTo(peelSize, h);
    ctx.quadraticCurveTo(peelSize * 0.3, h - peelSize * 0.3, 0, h - peelSize);
    ctx.closePath();
    ctx.fillStyle = 'rgba(240, 238, 235, 0.9)';
    ctx.fill();

    const grad = ctx.createRadialGradient(peelSize * 0.5, h - peelSize * 0.5, 0, peelSize * 0.5, h - peelSize * 0.5, peelSize);
    grad.addColorStop(0, 'rgba(0,0,0,0.12)');
    grad.addColorStop(1, 'rgba(0,0,0,0)');
    ctx.fillStyle = grad;
    ctx.fill();

    ctx.beginPath();
    ctx.moveTo(0, h);
    ctx.lineTo(peelSize * 0.7, h);
    ctx.quadraticCurveTo(peelSize * 0.15, h - peelSize * 0.15, 0, h - peelSize * 0.7);
    ctx.closePath();
    ctx.fillStyle = '#fff';
    ctx.fill();
    ctx.strokeStyle = 'rgba(0,0,0,0.08)';
    ctx.lineWidth = 0.5;
    ctx.stroke();
    ctx.restore();
  }
}

function updateCornerPeels() {
  if (!peelRight || !peelLeft) return;
  const canGoNext = currentSpread < getSpreadCount() - 1;
  const canGoPrev = currentSpread > 0;
  peelRight.style.display = canGoNext ? 'block' : 'none';
  peelLeft.style.display = canGoPrev ? 'block' : 'none';
}

let peelAnimR = null;
let peelAnimL = null;

function animatePeel(peelEl, side, targetAmount, duration) {
  const canvas = peelEl.querySelector('canvas');
  const startAmount = parseFloat(peelEl.dataset.amount || 0);
  const startTime = performance.now();

  function step(now) {
    const t = Math.min((now - startTime) / duration, 1);
    const ease = t < 0.5 ? 2 * t * t : -1 + (4 - 2 * t) * t;
    const current = startAmount + (targetAmount - startAmount) * ease;
    drawPeelCanvas(canvas, side, current);
    peelEl.dataset.amount = current;
    if (t < 1) {
      if (side === 'right') peelAnimR = requestAnimationFrame(step);
      else peelAnimL = requestAnimationFrame(step);
    }
  }
  if (side === 'right' && peelAnimR) cancelAnimationFrame(peelAnimR);
  if (side === 'left' && peelAnimL) cancelAnimationFrame(peelAnimL);
  requestAnimationFrame(step);
}

// ── Page turn animation ──

function animatePageTurn(direction, callback) {
  if (isAnimating) return;
  isAnimating = true;

  // Hide peels during animation
  if (peelRight) peelRight.style.opacity = '0';
  if (peelLeft) peelLeft.style.opacity = '0';

  const book = document.getElementById('book');
  const spreads = book.querySelectorAll('.spread');
  const currentEl = spreads[currentSpread];

  const overlay = document.createElement('div');
  overlay.style.cssText = 'position:absolute;inset:0;z-index:50;perspective:2400px;overflow:hidden;';
  book.appendChild(overlay);

  if (direction === 'next') {
    // ── FORWARD: right page folds left ──
    const nextSpread = currentSpread + 1;
    const nextEl = spreads[nextSpread];

    // Show current left page underneath (stays visible)
    const underLeft = document.createElement('div');
    underLeft.style.cssText = 'position:absolute;top:0;left:0;width:50%;height:100%;background:#fff;overflow:hidden;';
    const curLeftImg = makePageImg(currentSpread * 2);
    if (curLeftImg) underLeft.appendChild(curLeftImg);
    overlay.appendChild(underLeft);

    // Show next right page underneath on the right
    const underRight = document.createElement('div');
    underRight.style.cssText = 'position:absolute;top:0;right:0;width:50%;height:100%;background:#fff;overflow:hidden;';
    const nextRightImg = makePageImg(nextSpread * 2 + 1);
    if (nextRightImg) underRight.appendChild(nextRightImg);
    overlay.appendChild(underRight);

    // The turning page: hinged on the LEFT edge of the right half (i.e. the spine)
    const turningPage = document.createElement('div');
    turningPage.style.cssText = `
      position:absolute;top:0;left:50%;width:50%;height:100%;
      transform-origin:left center;transform-style:preserve-3d;
      transition:transform 0.7s cubic-bezier(0.645,0.045,0.355,1);
      z-index:30;
    `;

    // Front: current right page (visible at start)
    const front = document.createElement('div');
    front.style.cssText = 'position:absolute;inset:0;backface-visibility:hidden;overflow:hidden;background:#fff;';
    const frontImg = makePageImg(currentSpread * 2 + 1);
    if (frontImg) front.appendChild(frontImg);
    // Fold shadow on front
    const fShadow = document.createElement('div');
    fShadow.style.cssText = 'position:absolute;inset:0;background:linear-gradient(to left,transparent 60%,rgba(0,0,0,0.06) 100%);';
    front.appendChild(fShadow);
    turningPage.appendChild(front);

    // Back: next left page (revealed after flip)
    const back = document.createElement('div');
    back.style.cssText = 'position:absolute;inset:0;backface-visibility:hidden;transform:rotateY(180deg);overflow:hidden;background:#fff;';
    const backImg = makePageImg(nextSpread * 2);
    if (backImg) back.appendChild(backImg);
    const bShadow = document.createElement('div');
    bShadow.style.cssText = 'position:absolute;inset:0;background:linear-gradient(to right,transparent 60%,rgba(0,0,0,0.06) 100%);';
    back.appendChild(bShadow);
    turningPage.appendChild(back);

    overlay.appendChild(turningPage);

    // Spine shadow overlay
    const spineShadow = document.createElement('div');
    spineShadow.className = 'spine-shadow';
    overlay.appendChild(spineShadow);

    requestAnimationFrame(() => {
      requestAnimationFrame(() => {
        turningPage.style.transform = 'rotateY(-180deg)';
      });
    });

    turningPage.addEventListener('transitionend', () => {
      currentEl.classList.add('hidden');
      nextEl.classList.remove('hidden');
      currentSpread = nextSpread;
      overlay.remove();
      updateIndicator();
      isAnimating = false;
      if (callback) callback();
    }, { once: true });

  } else {
    // ── BACKWARD: left page folds right over the current right page ──
    // The left page lifts from the spine and swings to the right.
    // Underneath on the left: previous spread's left page is revealed.
    // Underneath on the right: the CURRENT right page stays visible (not the prev one).
    // The turning page's back face shows the previous spread's right page,
    // which only becomes visible once the page has fully landed on top of 
    // the current right page — then the whole overlay is removed and 
    // the previous spread (with its own right page) takes over.
    
    const prevSpread = currentSpread - 1;
    const prevEl = spreads[prevSpread];

    // Underneath left: previous spread's left page (revealed as left page lifts)
    const underLeft = document.createElement('div');
    underLeft.style.cssText = 'position:absolute;top:0;left:0;width:50%;height:100%;background:#fff;overflow:hidden;';
    const prevLeftImg = makePageImg(prevSpread * 2);
    if (prevLeftImg) underLeft.appendChild(prevLeftImg);
    overlay.appendChild(underLeft);

    // Underneath right: CURRENT right page (stays in place during the animation)
    const underRight = document.createElement('div');
    underRight.style.cssText = 'position:absolute;top:0;right:0;width:50%;height:100%;background:#fff;overflow:hidden;';
    const curRightImg = makePageImg(currentSpread * 2 + 1);
    if (curRightImg) underRight.appendChild(curRightImg);
    overlay.appendChild(underRight);

    // The turning page: left half, hinged at spine (right edge)
    // Starts flat showing current left page, swings to 180deg
    const turningPage = document.createElement('div');
    turningPage.style.cssText = `
      position:absolute;top:0;left:0;width:50%;height:100%;
      transform-origin:right center;transform-style:preserve-3d;
      transition:transform 0.7s cubic-bezier(0.645,0.045,0.355,1);
      z-index:30;
    `;

    // Front: current left page (visible at start)
    const front = document.createElement('div');
    front.style.cssText = 'position:absolute;inset:0;backface-visibility:hidden;overflow:hidden;background:#fff;';
    const frontImg = makePageImg(currentSpread * 2);
    if (frontImg) front.appendChild(frontImg);
    const fShadow = document.createElement('div');
    fShadow.style.cssText = 'position:absolute;inset:0;background:linear-gradient(to right,transparent 60%,rgba(0,0,0,0.06) 100%);';
    front.appendChild(fShadow);
    turningPage.appendChild(front);

    // Back: previous spread's right page (only visible once page has folded over)
    const back = document.createElement('div');
    back.style.cssText = 'position:absolute;inset:0;backface-visibility:hidden;transform:rotateY(180deg);overflow:hidden;background:#fff;';
    const backImg = makePageImg(prevSpread * 2 + 1);
    if (backImg) back.appendChild(backImg);
    const bShadow = document.createElement('div');
    bShadow.style.cssText = 'position:absolute;inset:0;background:linear-gradient(to left,transparent 60%,rgba(0,0,0,0.06) 100%);';
    back.appendChild(bShadow);
    turningPage.appendChild(back);

    overlay.appendChild(turningPage);

    const spineShadow = document.createElement('div');
    spineShadow.className = 'spine-shadow';
    overlay.appendChild(spineShadow);

    requestAnimationFrame(() => {
      requestAnimationFrame(() => {
        turningPage.style.transform = 'rotateY(180deg)';
      });
    });

    turningPage.addEventListener('transitionend', () => {
      currentEl.classList.add('hidden');
      prevEl.classList.remove('hidden');
      currentSpread = prevSpread;
      overlay.remove();
      updateIndicator();
      isAnimating = false;
      if (callback) callback();
    }, { once: true });
  }
}

function goNext() {
  if (currentSpread >= getSpreadCount() - 1 || isAnimating) return;
  animatePageTurn('next');
}

function goPrev() {
  if (currentSpread <= 0 || isAnimating) return;
  animatePageTurn('prev');
}

// ── Init ──
buildSpreads();
createCornerPeels();
updateIndicator();

document.getElementById('btnNext').addEventListener('click', goNext);
document.getElementById('btnPrev').addEventListener('click', goPrev);
document.getElementById('navRight').addEventListener('click', goNext);
document.getElementById('navLeft').addEventListener('click', goPrev);

// Corner peel hover interactions
const navRight = document.getElementById('navRight');
const navLeft = document.getElementById('navLeft');

navRight.addEventListener('mouseenter', () => {
  if (currentSpread >= getSpreadCount() - 1 || isAnimating) return;
  peelRight.style.opacity = '1';
  animatePeel(peelRight, 'right', 1, 250);
});
navRight.addEventListener('mouseleave', () => {
  animatePeel(peelRight, 'right', 0, 200);
  setTimeout(() => { if (parseFloat(peelRight.dataset.amount || 0) < 0.1) peelRight.style.opacity = '0'; }, 220);
});

navLeft.addEventListener('mouseenter', () => {
  if (currentSpread <= 0 || isAnimating) return;
  peelLeft.style.opacity = '1';
  animatePeel(peelLeft, 'left', 1, 250);
});
navLeft.addEventListener('mouseleave', () => {
  animatePeel(peelLeft, 'left', 0, 200);
  setTimeout(() => { if (parseFloat(peelLeft.dataset.amount || 0) < 0.1) peelLeft.style.opacity = '0'; }, 220);
});

// Keyboard
document.addEventListener('keydown', (e) => {
  if (e.key === 'ArrowRight' || e.key === ' ') { e.preventDefault(); goNext(); }
  if (e.key === 'ArrowLeft') { e.preventDefault(); goPrev(); }
  if ((e.key === '=' || e.key === '+') && !e.ctrlKey && !e.metaKey) { e.preventDefault(); zoomIn(); }
  if (e.key === '-' && !e.ctrlKey && !e.metaKey) { e.preventDefault(); zoomOut(); }
  if (e.key === '0') { e.preventDefault(); zoomReset(); }
});

// ── Zoom ──
const ZOOM_MIN = 0.5;
const ZOOM_MAX = 3;
const ZOOM_STEP = 0.25;
let zoomScale = 1;
let panX = 0;
let panY = 0;

const container = document.getElementById('flipbookContainer');
const zoomWrapper = document.getElementById('zoomWrapper');
const zoomLevelEl = document.getElementById('zoomLevel');
const exitZoomBtn = document.getElementById('exitZoomBtn');

function applyZoom() {
  if (zoomScale <= 1) { panX = 0; panY = 0; }
  container.style.transform = `scale(${zoomScale}) translate(${panX}px, ${panY}px)`;
  zoomLevelEl.textContent = Math.round(zoomScale * 100) + '%';
  document.getElementById('btnZoomIn').disabled = zoomScale >= ZOOM_MAX;
  document.getElementById('btnZoomOut').disabled = zoomScale <= ZOOM_MIN;
  const isZoomed = zoomScale > 1;
  zoomWrapper.classList.toggle('is-panning', isZoomed);
  // Hide click-to-turn overlays when zoomed so dragging works on the book
  document.getElementById('navLeft').style.display = isZoomed ? 'none' : '';
  document.getElementById('navRight').style.display = isZoomed ? 'none' : '';
  exitZoomBtn.classList.toggle('visible', isZoomed);
}

function zoomIn() {
  zoomScale = Math.min(ZOOM_MAX, Math.round((zoomScale + ZOOM_STEP) * 100) / 100);
  applyZoom();
}

function zoomOut() {
  zoomScale = Math.max(ZOOM_MIN, Math.round((zoomScale - ZOOM_STEP) * 100) / 100);
  applyZoom();
}

function zoomReset() {
  zoomScale = 1; panX = 0; panY = 0;
  applyZoom();
}

document.getElementById('btnZoomIn').addEventListener('click', zoomIn);
document.getElementById('btnZoomOut').addEventListener('click', zoomOut);
exitZoomBtn.addEventListener('click', zoomReset);
zoomLevelEl.addEventListener('click', zoomReset);
zoomLevelEl.style.cursor = 'pointer';
zoomLevelEl.title = 'Reset zoom (0)';

// Ctrl/Cmd + scroll to zoom, plain scroll to pan when zoomed
zoomWrapper.addEventListener('wheel', (e) => {
  if (e.ctrlKey || e.metaKey) {
    e.preventDefault();
    if (e.deltaY < 0) zoomIn();
    else zoomOut();
  } else if (zoomScale > 1) {
    e.preventDefault();
    panX -= e.deltaX / zoomScale;
    panY -= e.deltaY / zoomScale;
    container.style.transition = 'none';
    applyZoom();
    clearTimeout(zoomWrapper._scrollRestore);
    zoomWrapper._scrollRestore = setTimeout(() => {
      container.style.transition = 'transform 0.3s cubic-bezier(0.25, 0.46, 0.45, 0.94)';
    }, 100);
  }
}, { passive: false });

// Click-and-drag to pan when zoomed in
let isPanning = false;
let panStartX = 0;
let panStartY = 0;
let panStartPanX = 0;
let panStartPanY = 0;

zoomWrapper.addEventListener('mousedown', (e) => {
  if (zoomScale <= 1) return;
  if (e.target.closest('.nav-btn') || e.target.closest('.controls') || e.target.closest('.exit-zoom-btn')) return;
  isPanning = true;
  panStartX = e.clientX;
  panStartY = e.clientY;
  panStartPanX = panX;
  panStartPanY = panY;
  e.preventDefault();
});

document.addEventListener('mousemove', (e) => {
  if (!isPanning) return;
  const dx = (e.clientX - panStartX) / zoomScale;
  const dy = (e.clientY - panStartY) / zoomScale;
  panX = panStartPanX + dx;
  panY = panStartPanY + dy;
  container.style.transition = 'none';
  applyZoom();
});

document.addEventListener('mouseup', () => {
  if (isPanning) {
    isPanning = false;
    container.style.transition = 'transform 0.3s cubic-bezier(0.25, 0.46, 0.45, 0.94)';
  }
});
</script>
</body>
